name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # No lockfile committed; ai-consensus-core must be published on npm for this
      # to resolve. Uses `npm install` (not `npm ci`) accordingly.
      - run: npm install

      # `check` runs typecheck + lint + format:check + tests with coverage thresholds.
      # Coverage thresholds are anchored at the current baseline (see vitest.config.ts)
      # and ratchet up phase by phase as new tested modules land.
      - run: npm run check

      # Build then run the stdio handshake smoke test against the built binary.
      # Verifies the server starts, advertises tools, and shuts down cleanly
      # without any provider API keys.
      - run: npm run build
      - run: npm run test:smoke
